<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公司內部 - 主播收益與時數看板</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; text-align: center; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .dashboard-container { max-width: 1200px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        h2 { color: #333; margin-top: 0; margin-bottom: 20px; }
        
        /* 分頁按鈕樣式 */
        .tabs { display: flex; justify-content: center; margin-bottom: 20px; border-bottom: 2px solid #ddd; }
        .tab-btn { padding: 12px 25px; margin: 0 5px; font-size: 16px; cursor: pointer; background: #eef2f5; border: none; border-radius: 8px 8px 0 0; color: #555; transition: 0.3s; }
        .tab-btn:hover { background: #dce4e8; }
        .tab-btn.active { background: #0066cc; color: white; font-weight: bold; }

        /* 篩選器樣式 */
        .filter-section { background: #eef2f5; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: none; text-align: left; }
        .filter-section strong { margin-right: 15px; color: #444; }
        .checkbox-label { margin-right: 15px; cursor: pointer; font-size: 15px; display: inline-flex; align-items: center; }
        .checkbox-label input { margin-right: 5px; width: 16px; height: 16px; cursor: pointer; }
        
        #loading { font-size: 18px; color: #0066cc; font-weight: bold; padding: 40px; }
        .chart-wrapper { width: 100%; height: 65vh; position: relative; }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <h2>主播營運數據分析看板</h2>
        
        <div class="tabs" id="tabNav" style="display: none;">
            <button class="tab-btn active" onclick="switchTab(1)">📊 總體表現 (均時 vs 月均收益)</button>
            <button class="tab-btn" onclick="switchTab(2)">⚡ 變現效率 (時/天 vs 收益/時)</button>
        </div>
        
        <div id="loading">讀取資料中，請稍候...</div>

        <div class="filter-section" id="filterSection">
            <strong>篩選顯示標籤：</strong>
            <span id="checkboxContainer"></span>
        </div>

        <div class="chart-wrapper">
            <canvas id="myChart"></canvas>
        </div>
    </div>

    <script>
        const csvFileName = "data.csv"; 
        
        let myChartInstance = null; 
        let allParsedData = [];     
        const allCategories = ['高收高時', '高收低時', '低收高時', '低收低時', '導師'];
        
        // 紀錄目前所在的頁籤 (預設為 1)
        let currentTab = 1;

        Papa.parse(csvFileName, {
            download: true,
            header: true,
            complete: function(results) {
                // 隱藏載入中文字，顯示分頁與篩選器
                document.getElementById('loading').style.display = 'none';
                document.getElementById('tabNav').style.display = 'flex';
                document.getElementById('filterSection').style.display = 'block';
                
                results.data.forEach(row => {
                    let category = null;
                    let v1_y = null; // 第一頁的 Y (月均收益)
                    
                    // 尋找分類標籤並提取第一頁的 Y 軸資料
                    for(let col of allCategories) {
                        if(row[col] && row[col].trim() !== '') {
                            category = col;
                            v1_y = parseFloat(row[col].replace(/,/g, ''));
                            break;
                        }
                    }

                    // 第一頁的 X (1,2月均時)
                    let v1_x = parseFloat(row['1,2月均時']);

                    // 第二頁的 Y (收益/時，K列) 與 X (時/天，L列)
                    // 加上 String().replace() 是為了避免千分位逗號導致解析錯誤
                    let rawY2 = row['收益/時'] ? String(row['收益/時']).replace(/,/g, '') : 'NaN';
                    let rawX2 = row['時/天'] ? String(row['時/天']).replace(/,/g, '') : 'NaN';
                    
                    let v2_y = parseFloat(rawY2);
                    let v2_x = parseFloat(rawX2);

                    if(category && !isNaN(v1_x) && !isNaN(v1_y)) {
                        allParsedData.push({
                            id: row['主播ID'],
                            name: row['主播暱稱'],
                            category: category,
                            v1_x: v1_x,
                            v1_y: v1_y,
                            v2_x: v2_x,
                            v2_y: v2_y
                        });
                    }
                });

                createCheckboxes();
                updateChart();
            },
            error: function(err) {
                document.getElementById('loading').innerHTML = "❌ 無法讀取資料檔案。<br><br>請確認是否已上傳至 GitHub，並將檔名命名為 <b>data.csv</b>。";
                console.error(err);
            }
        });

        // 產生核取方塊的函數
        function createCheckboxes() {
            const container = document.getElementById('checkboxContainer');
            allCategories.forEach(cat => {
                const label = document.createElement('label');
                label.className = 'checkbox-label';
                
                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.value = cat;
                checkbox.checked = true; 
                
                checkbox.addEventListener('change', updateChart);
                
                label.appendChild(checkbox);
                label.appendChild(document.createTextNode(cat));
                container.appendChild(label);
            });
        }

        // 切換分頁的函數
        function switchTab(tabId) {
            currentTab = tabId;
            // 更新按鈕的視覺外觀
            const buttons = document.querySelectorAll('.tab-btn');
            buttons.forEach((btn, index) => {
                btn.className = (index + 1 === tabId) ? 'tab-btn active' : 'tab-btn';
            });
            // 重新畫圖
            updateChart();
        }

        // 畫圖的核心函數
        function updateChart() {
            const checkboxes = document.querySelectorAll('#checkboxContainer input[type="checkbox"]:checked');
            const activeCategories = Array.from(checkboxes).map(cb => cb.value);

            const datasetsConfig = [
                { label: '高收高時', backgroundColor: 'Cyan', data: [] },
                { label: '高收低時', backgroundColor: 'Green', data: [] },
                { label: '低收高時', backgroundColor: 'Orange', data: [] },
                { label: '低收低時', backgroundColor: 'Red', data: [] },
                { label: '導師', backgroundColor: 'Blue', data: [] }
            ];

            const categoryIndexMap = {
                '高收高時': 0, '高收低時': 1, '低收高時': 2, '低收低時': 3, '導師': 4
            };

            // 根據目前所在的分頁，把不同的 X, Y 資料塞進圖表
            allParsedData.forEach(item => {
                if (activeCategories.includes(item.category)) {
                    const idx = categoryIndexMap[item.category];
                    if (idx !== undefined) {
                        if (currentTab === 1) {
                            datasetsConfig[idx].data.push({ x: item.v1_x, y: item.v1_y, id: item.id, name: item.name });
                        } else if (currentTab === 2) {
                            // 確保第二頁的資料是有效的數字才加入
                            if (!isNaN(item.v2_x) && !isNaN(item.v2_y)) {
                                datasetsConfig[idx].data.push({ x: item.v2_x, y: item.v2_y, id: item.id, name: item.name });
                            }
                        }
                    }
                }
            });

            const finalDatasets = datasetsConfig.filter(ds => activeCategories.includes(ds.label));

            if (myChartInstance) {
                myChartInstance.destroy();
            }

            // 根據目前所在的分頁，設定不同的標題文字與提示框
            let xTitle = currentTab === 1 ? '1,2月均時 (小時)' : '時 / 天 (每天平均開播時數)';
            let yTitle = currentTab === 1 ? '月均收益 (鑽)' : '收益 / 時 (每小時產能)';
            
            // 根據目前分頁，設定十字基準線 (只有第一頁有)
            let currentAnnotations = {};
            if (currentTab === 1) {
                currentAnnotations = {
                    hLine: { type: 'line', yMin: 600000, yMax: 600000, borderColor: 'rgba(255, 0, 0, 0.7)', borderWidth: 2, borderDash: [5, 5], label: { display: true, content: '收益 60 萬', position: 'end' } },
                    vLine: { type: 'line', xMin: 40, xMax: 40, borderColor: 'rgba(0, 0, 255, 0.7)', borderWidth: 2, borderDash: [5, 5], label: { display: true, content: '均時 40', position: 'start' } }
                };
            }

            const ctx = document.getElementById('myChart').getContext('2d');
            myChartInstance = new Chart(ctx, {
                type: 'scatter',
                data: { datasets: finalDatasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'top', labels: { font: { size: 14 } } },
                        tooltip: {
                            backgroundColor: 'rgba(0,0,0,0.8)',
                            titleFont: { size: 16 },
                            bodyFont: { size: 14 },
                            callbacks: {
                                label: function(context) {
                                    const pt = context.raw;
                                    if (currentTab === 1) {
                                        return `${pt.name} (ID: ${pt.id}) | 均時: ${pt.x} 小時 | 收益: ${pt.y.toLocaleString()} 鑽`;
                                    } else {
                                        return `${pt.name} (ID: ${pt.id}) | 努力度(時/天): ${pt.x} | 變現力(收益/時): ${pt.y.toLocaleString()}`;
                                    }
                                }
                            }
                        },
                        annotation: {
                            annotations: currentAnnotations
                        }
                    },
                    scales: {
                        x: { title: { display: true, text: xTitle, font: { size: 14, weight: 'bold' } } },
                        y: { type: 'logarithmic', // 只讓收益變成對數刻度
title: { display: true, text: yTitle, font: { size: 14, weight: 'bold' } } }
                    }
                }
            });
        }
    </script>
</body>
</html>
